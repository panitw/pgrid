<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Inline Editing · PGrid</title>
    <link rel="stylesheet" href="./_shared.css">
</head>
<body>
    <div class="sample-page">
        
        <header class="docs-top">
            <a class="brand" href="../docs/index.html">PGrid <span class="tag">docs</span></a>
            <nav>
                <a href="../docs/getting-started.html">Getting Started</a>
                <a href="../docs/configuration.html">Configuration</a>
                <a href="../docs/data.html">Data</a>
                <a href="../docs/extensions.html">Extensions</a>
                <a href="../docs/api.html">API</a>
                <a href="./index.html" class="active">Samples</a>
                <a href="https://github.com/panitw/pgrid" target="_blank" rel="noopener">GitHub ↗</a>
            </nav>
        </header>
<div class="sample-header">
            <a class="back" href="./index.html">← All demos</a>
            <h1>Inline Editing</h1>
            <span class="desc">Built-in text editor — double-click, Enter, or just start typing. Tab commits and advances. ESC cancels. Delete clears.</span>
        </div>

        <div class="sample-grid-wrap">
            <div class="sample-grid"><div id="gridDiv"></div></div>
        </div>

        <div class="sample-status" id="status">Editable columns are highlighted.</div>
    </div>

    <script type="module">
        import { PGrid } from "../src/index.js";
        import { generateEmployees, EMPLOYEE_FIELDS } from "./_data.js";

        const grid = new PGrid({
            rowHeight: 32,
            columnWidth: 130,
            selection: { cssClass: 'grid-cell-selection' },
            editing: true,
            autoUpdate: true,
            columns: [
                { id: 0, field: 'id',         title: 'ID',         width: 100 },
                { id: 1, field: 'name',       title: 'Name',       width: 180, editable: true, cssClass: 'grid-col-editable' },
                { id: 2, field: 'email',      title: 'Email',      width: 240, editable: true, cssClass: 'grid-col-editable' },
                { id: 3, field: 'department', title: 'Department', width: 140 },
                { id: 4, field: 'role',       title: 'Role',       width: 180, editable: true, cssClass: 'grid-col-editable' },
                { id: 5, field: 'location',   title: 'Location',   width: 140, editable: true, cssClass: 'grid-col-editable' },
                { id: 6, field: 'status',     title: 'Status',     width: 110 },
                { id: 7, field: 'notes',      title: 'Notes',      width: 260, editable: true, cssClass: 'grid-col-editable' }
            ],
            headerRows: [{ i: 0, cssClass: 'grid-header-row' }],
            dataModel: { fields: EMPLOYEE_FIELDS, format: 'rows', data: generateEmployees(100) }
        });

        grid.render(document.getElementById('gridDiv'));
        window.grid = grid;

        const status = document.getElementById('status');
        grid.data.listen('dataChanged', (e) => {
            const u = e.updates && e.updates[0];
            if (u && u.field) {
                status.textContent = `Updated → row ${u.rowId}, ${u.field}: ${JSON.stringify(u.prevData)} → ${JSON.stringify(u.data)}`;
            }
        });
    </script>
</body>
</html>

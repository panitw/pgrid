<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Selection & Keyboard · PGrid</title>
    <link rel="stylesheet" href="./_shared.css">
</head>
<body>
    <div class="sample-page">
        
        <header class="docs-top">
            <a class="brand" href="../docs/index.html">PGrid <span class="tag">docs</span></a>
            <nav>
                <a href="../docs/getting-started.html">Getting Started</a>
                <a href="../docs/configuration.html">Configuration</a>
                <a href="../docs/data.html">Data</a>
                <a href="../docs/styling.html">Styling</a>
                <a href="../docs/extensions.html">Extensions</a>
                <a href="../docs/api.html">API</a>
                <a href="./index.html" class="active">Samples</a>
                <a href="https://github.com/panitw/pgrid" target="_blank" rel="noopener">GitHub ↗</a>
            </nav>
        </header>
<div class="sample-header">
            <a class="back" href="./index.html">← All demos</a>
            <h1>Selection & Keyboard Navigation</h1>
            <span class="desc">Click to select. Use arrow keys, Tab, and scroll-to-cell.</span>
        </div>

        <div class="sample-toolbar">
            <button id="jump">Jump to row 50, col 3</button>
            <span class="divider"></span>
            <span class="desc">Try arrow keys, Tab, and click anywhere on the grid.</span>
        </div>

        <div class="sample-grid-wrap">
            <div class="sample-grid"><div id="gridDiv"></div></div>
        </div>

        <div class="sample-status" id="status">No cell selected.</div>
    </div>

    <script type="module">
        import { PGrid } from "../src/index.js";
        import { generateEmployees, EMPLOYEE_FIELDS } from "./_data.js";

        const grid = new PGrid({
            rowHeight: 32,
            columnWidth: 130,
            selection: { cssClass: 'grid-cell-selection' },
            columns: [
                { id: 0, field: 'id',         title: 'ID',         width: 100 },
                { id: 1, field: 'name',       title: 'Name',       width: 180 },
                { id: 2, field: 'email',      title: 'Email',      width: 240 },
                { id: 3, field: 'department', title: 'Department', width: 140 },
                { id: 4, field: 'role',       title: 'Role',       width: 180 },
                { id: 5, field: 'location',   title: 'Location',   width: 140 },
                { id: 6, field: 'status',     title: 'Status',     width: 110 },
                { id: 7, field: 'hired',      title: 'Hired',      width: 110 }
            ],
            headerRows: [{ i: 0, cssClass: 'grid-header-row' }],
            dataModel: { fields: EMPLOYEE_FIELDS, format: 'rows', data: generateEmployees(200) }
        });

        grid.render(document.getElementById('gridDiv'));
        window.grid = grid;

        const status = document.getElementById('status');
        const updateStatus = () => {
            const sel = grid.state.get('selection');
            if (sel && sel.length) {
                const { r, c } = sel[0];
                const field = grid.model.getColumnField(c);
                const value = grid.model.getDataAt(r, c);
                status.textContent = `Selected → row ${r}, col ${c} (${field}) = ${JSON.stringify(value)}`;
            } else {
                status.textContent = 'No cell selected.';
            }
        };

        // Poll on key events for status updates
        document.addEventListener('keydown', () => setTimeout(updateStatus, 0));
        document.addEventListener('mousedown', () => setTimeout(updateStatus, 0));

        document.getElementById('jump').addEventListener('click', () => {
            const sel = grid.extension.getExtension('DEFAULT_EXT_SELECTION');
            sel.selectCell(3, 50);
            updateStatus();
        });
    </script>
</body>
</html>

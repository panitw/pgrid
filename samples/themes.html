<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Themes · PGrid</title>
    <link rel="stylesheet" href="./_shared.css">
    <style>
        /* -----------------------------------------------------------------
           Each theme below scopes its overrides to a single class on the
           grid container — toggle the class to switch themes at runtime.
           ----------------------------------------------------------------- */

        /* --- Compact theme: tighter rows, smaller text, subtle borders --- */
        .theme-compact .pgrid-cell {
            border-bottom: 1px solid #ececef;
            border-right: none;
            font-size: 12px;
        }
        .theme-compact .grid-header-row {
            font-size: 11px !important;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #71717a !important;
        }

        /* --- Spreadsheet theme: gridded cells, mono numerics, blue focus --- */
        .theme-spreadsheet .pgrid-cell {
            border-bottom: 1px solid #d4d4d8;
            border-right: 1px solid #d4d4d8;
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
            font-size: 12.5px;
        }
        .theme-spreadsheet .grid-header-row {
            background-color: #1f2937 !important;
            color: #f9fafb !important;
            border-bottom: 1px solid #111827 !important;
            font-family: ui-sans-serif, system-ui, sans-serif !important;
        }
        .theme-spreadsheet .grid-cell-selection {
            background-color: rgba(56, 189, 248, 0.18) !important;
            box-shadow: inset 0 0 0 2px #2563eb !important;
        }

        /* --- Dark theme: full inversion --- */
        .theme-dark {
            background: #0f172a;
            color: #e2e8f0;
        }
        .theme-dark .pgrid-cell {
            background: #0f172a;
            color: #e2e8f0;
            border-bottom: 1px solid #1e293b;
            border-right: 1px solid #1e293b;
        }
        .theme-dark .grid-header-row {
            background-color: #1e293b !important;
            color: #f1f5f9 !important;
            border-bottom: 1px solid #334155 !important;
        }
        .theme-dark .grid-cell-selection {
            background-color: rgba(56, 189, 248, 0.2) !important;
            box-shadow: inset 0 0 0 2px #38bdf8 !important;
        }
        .theme-dark .row-zebra-odd {
            background: #111827 !important;
        }

        /* Zebra striping (used by Default + Dark themes) */
        .row-zebra-odd { background-color: #fafbfc; }

        /* Override the .sample-grid container background per theme so the
           rounded card matches the theme's surface color. */
        .sample-grid.theme-dark        { background: #0f172a; border-color: #1e293b; }
        .sample-grid.theme-spreadsheet { background: #f8fafc; }
        .sample-grid.theme-compact     { background: #ffffff; }
    </style>
</head>
<body>
    <div class="sample-page">
        <header class="docs-top">
            <a class="brand" href="../docs/index.html">PGrid <span class="tag">docs</span></a>
            <nav>
                <a href="../docs/getting-started.html">Getting Started</a>
                <a href="../docs/configuration.html">Configuration</a>
                <a href="../docs/data.html">Data</a>
                <a href="../docs/styling.html">Styling</a>
                <a href="../docs/extensions.html">Extensions</a>
                <a href="../docs/api.html">API</a>
                <a href="./index.html" class="active">Samples</a>
                <a href="https://github.com/panitw/pgrid" target="_blank" rel="noopener">GitHub ↗</a>
            </nav>
        </header>

        <div class="sample-header">
            <a class="back" href="./index.html">← All demos</a>
            <h1>Themes</h1>
            <span class="desc">Each theme is just a CSS class scoped to the grid container — same data, same config, different look.</span>
        </div>

        <div class="sample-toolbar">
            <label>Theme:</label>
            <button data-theme="">Default</button>
            <button data-theme="theme-compact">Compact</button>
            <button data-theme="theme-spreadsheet">Spreadsheet</button>
            <button data-theme="theme-dark">Dark</button>
        </div>

        <div class="sample-grid-wrap">
            <div class="sample-grid" id="gridContainer"><div id="gridDiv"></div></div>
        </div>
    </div>

    <script type="module">
        import { PGrid } from "../src/index.js";
        import { generateEmployees, EMPLOYEE_FIELDS } from "./_data.js";

        const zebra = {
            cellAfterRender(e) { if (e.rowIndex % 2 === 1) e.cell.classList.add('row-zebra-odd'); },
            cellAfterRecycled(e) { e.cell.classList.remove('row-zebra-odd'); }
        };

        const grid = new PGrid({
            rowHeight: 32,
            columnWidth: 130,
            selection: { cssClass: 'grid-cell-selection' },
            columns: [
                { id: 0, field: 'id',         title: 'ID',         width: 100 },
                { id: 1, field: 'name',       title: 'Name',       width: 180 },
                { id: 2, field: 'email',      title: 'Email',      width: 240 },
                { id: 3, field: 'department', title: 'Department', width: 140 },
                { id: 4, field: 'role',       title: 'Role',       width: 180 },
                { id: 5, field: 'location',   title: 'Location',   width: 140 },
                { id: 6, field: 'status',     title: 'Status',     width: 110 },
                { id: 7, field: 'hired',      title: 'Hired',      width: 110 }
            ],
            headerRows: [{ i: 0, cssClass: 'grid-header-row' }],
            dataModel: { fields: EMPLOYEE_FIELDS, format: 'rows', data: generateEmployees(120) },
            extensions: [zebra]
        });

        grid.render(document.getElementById('gridDiv'));
        window.grid = grid;

        const container = document.getElementById('gridContainer');
        const buttons = document.querySelectorAll('.sample-toolbar button[data-theme]');
        const setTheme = (cls) => {
            buttons.forEach(b => b.classList.toggle('primary', b.dataset.theme === cls));
            ['theme-compact', 'theme-spreadsheet', 'theme-dark'].forEach(c => container.classList.remove(c));
            if (cls) container.classList.add(cls);
        };
        buttons.forEach(b => b.addEventListener('click', () => setTheme(b.dataset.theme)));
        setTheme('');
    </script>
</body>
</html>
